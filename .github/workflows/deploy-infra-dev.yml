on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/environments/dev/**"
      - "infra/modules/**"

permissions:
  # AWS OIDC
  id-token: write
  # needed since we are now defining permissions
  contents: read

jobs:
  terraform-deploy-dev:
    defaults:
      run:
        working-directory: ./infra/environments/dev
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
        with:
          # only include the necessary files
          sparse-checkout: |
            infra/environments/dev
            infra/modules

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create tfvars file
        # load into env variable then make to file to prevent bash from stripping out newlines needed by terraform
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS }}
        run: echo "$TFVARS_CONTENT" > terraform.tfvars

      - name: Create backend.hcl file
        env:
          BACKEND_CONTENT: ${{ secrets.TF_S3_BACKEND }}
        run: echo "$BACKEND_CONTENT" > backend.hcl

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.7"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ^10.32.1

      - name: Install correct node version
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: infra/modules/receipt-ingestion-api/lambda/pnpm-lock.yaml

      - name: Install receipt-ingestion-api Lambda dependencies
        working-directory: ./infra/modules/receipt-ingestion-api/lambda
        run: pnpm install --frozen-lockfile

      - name: Build receipt-ingestion-api Lambda package
        working-directory: ./infra/modules/receipt-ingestion-api/lambda
        run: pnpm run build

      - name: Terraform Init
        run: terraform init -input=false -backend-config=backend.hcl > /dev/null 2>&1

      - name: Terraform Apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve -input=false > /dev/null 2>&1
